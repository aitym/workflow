name: Repository-Specific CI Pipeline

on:
  workflow_call:

jobs:
  test:
    name: mix test (${{ matrix.app }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [mafia, mafia_web]
      fail-fast: false

    services:
      mysql:
        image: mysql:9.6.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mafia_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y erlang
          wget -q https://builds.hex.pm/builds/elixir/v1.19.5-otp-28.zip -O elixir.zip
          sudo unzip -q elixir.zip -d /usr/local/elixir
          export PATH="/usr/local/elixir/bin:$PATH"
          mix local.hex --force
          mix local.rebar --force

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run migrations
        run: mix ecto.create && mix ecto.migrate

      - name: Run tests
        run: MIX_ENV=test mix test apps/${{ matrix.app }}
